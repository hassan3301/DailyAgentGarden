    Translation:
      description: An object containing translations from a key
      properties:
        businessKey:
          description: The key used to identify a translation
          example: users_key
          type: string
        charLength:
          description: The maximum length of the translation string. This is a user-defined
            value that does not affect the actual maximum length limitation of the
            descriptions in the backend.
          example: 10
          type: number
        descEn:
          description: The english translation of the given key
          example: Users
          type: string
        descFr:
          description: The french translation of the given key
          example: Utilisateurs
          type: string
        element:
          description: The element linked to the translation
          example: Element
          type: string
        isJson:
          description: Indicates if the descriptions are in JSON format
          example: false
          type: boolean
      type: object
    UUID:
      example: 01234567-89ab-cdef-0123-456789abcdef
      format: uuid
      type: string
    User:
      allOf:
      - properties:
          created:
            $ref: '#/components/schemas/Created'
          createdBy:
            description: The id of the user who created.
            format: uuid
            nullable: true
            type: string
          createdByUser:
            description: The user who created this user. It's an object of type User
              (self-reference). Will be null if not specified in the includes. Not
              all endpoints may support this. Include only adds the additional information
              on the main user entity, and not on additional users included.
            nullable: true
            type: object
          email:
            description: The email of the user
            format: email
            type: string
          enabled:
            description: Whether or not the user is enabled
            type: boolean
          firstName:
            description: The first name of the user
            type: string
          id:
            description: The id of the user
            format: uuid
            type: string
          lastName:
            description: The last name of the user
            type: string
          lastUpdated:
            $ref: '#/components/schemas/LastUpdated'
          lastUpdatedBy:
            description: The id of the user who updated.
            format: uuid
            nullable: true
            type: string
          lastUpdatedByUser:
            description: The user who last updated this user. It's an object of type
              User (self-reference). Will be null if not specified in the includes.
              Not all endpoints may support this. Include only adds the additional
              information on the main user entity, and not on additional users included.
            nullable: true
            type: object
          phoneNumber:
            description: The phone number of the user. Defaults to empty string
            maximum: 20
            type: string
          reseller:
            allOf:
            - $ref: '#/components/schemas/Reseller'
            description: The reseller linked to the user. Can be null
            nullable: true
          type:
            $ref: '#/components/schemas/UserType'
        type: object
    UserPermission:
      allOf:
      - properties:
          groupId:
            allOf:
            - $ref: '#/components/schemas/UUID'
            description: The id of the group the user has access to. Defaults to empty
              string for non-group permissions (location permissions or global permissions)
            format: uuid
            type: string
          id:
            description: |
              The id of the user permission. Can be empty if a user has implicit access to
              a location through a reseller (user must be of type agent and have a reseller linked).
            format: uuid
            type: string
          licenceNumber:
            allOf:
            - $ref: '#/components/schemas/LicenceNumber'
            description: The id of the licence number the user has access to. Defaults
              to 0 for non-location permissions (group permissions or global permissions)
          locationId:
            allOf:
            - $ref: '#/components/schemas/UUID'
            description: The id of the location the user has access to. Defaults to
              empty string for non-location permissions (group permissions or global
            format: uuid
            type: string
          permission:
            $ref: '#/components/schemas/Permission'
          userId:
            $ref: '#/components/schemas/UUID'
        type: object
    UserSetting:
      example:
        settings:
          'AWESOME GRAPH #1 ACTIVATED': "true"
          'AWESOME GRAPH #2 ACTIVATED': "false"
        userId: 01234567-89ab-cdef-0123-456789abcdef
      properties:
        settings:
          description: An object containing the user settings
          properties:
            key:
              description: The setting id
              type: string
            value:
              description: The setting value
              type: string
          type: object
        userId:
          $ref: '#/components/schemas/UUID'
    UserType:
      description: |
        The type of the user. Defaults to 0
         - 0: Merchant
         - 128: Agent (employee of a reseller). It is mandatory for agents to be linked to a reseller.
         - 256: Payfacto internal employee
      type: number
    UserWithExpandableUserPermissions:
      allOf:
      - $ref: '#/components/schemas/User'
      - properties:
          permissions:
            items:
              $ref: '#/components/schemas/ExpandableUserPermissions'
            type: array
        type: object
      example:
        created: "2001-01-30T18:00:00Z"
        email: abc@example.com
        firstName: Firstname
        id: 01234567-89ab-cdef-0123-456789abcdef
        lastName: Lastname
        lastUpdated: "2001-02-01T18:00:00Z"
        permissions:
        - groups:
          - group:
              id: 01234567-89ab-cdef-0123-456789abcdef
              kind: 0
              name: My Group
              parentGroupId: 01234567-89ab-cdef-0123-456789abcdef
            groupId: 01234567-89ab-cdef-0123-456789abcdef
            id: 01234567-89ab-cdef-0123-456789abcdef
            licenceNumber: 0
            locationId: ""
            permission: fullAccess
            userId: 01234567-89ab-cdef-0123-456789abcdef
          locations:
          - groupId: ""
            id: 01234567-89ab-cdef-0123-456789abcdef
            licenceNumber: 69997
            locationId: 01234567-89ab-cdef-0123-456789abcdef
            permission: fullAccess
            userId: 01234567-89ab-cdef-0123-456789abcdef
    UserWithExpandableUserPermissionsArray:
      items:
        $ref: '#/components/schemas/UserWithExpandableUserPermissions'
      type: array
    UserWithExpandableUserPermissionsPaginated:
      description: An object of division paginated content
      properties:
        content:
          items:
            $ref: '#/components/schemas/UserWithExpandableUserPermissions'
          type: array
        limit:
          description: The limit of user permissions returned
          example: 250
          type: integer
        offset:
          description: The offset of user permissions returned
          example: 1
          type: integer
        size:
          description: The total number of user permissions returned
          example: 1
          type: integer
        total:
          description: The total number of user permissions that can be returned
          example: 1
          type: integer
    UserWithToken:
      allOf:
      - $ref: '#/components/schemas/User'
      - $ref: '#/components/schemas/TokenContainer'
      - type: object
    Version:
      default: 0.0.0
      description: The version number. Any veloce version before 9.53.1 will show
        as 0.0.0.
      example: 9.53.1
      type: string
    WeekdayType:
      description: |
        The value of the weekday.
         >
        | Value | Week day     |
        |-------|--------------|
        |  0    | Sunday       |
        |  1    | Monday       |
        |  2    | Thuesday     |
        |  3    | Wednesday    |
        |  4    | Thursday     |
        |  5    | Friday       |
        |  6    | Saturday     |
        |  7    | All days     |
      example: 1
      maximum: 7
      minimum: 0
      type: number
    WeeklyScheduleValue:
      description: |
        The value of the schedule represents the value of all selected days in binary. For example, if only Sunday (the first day of the week) is available for a mode, the schedule value will be 1, i.e. (0000001)₂ = (0 × 2⁶) + (0 × 2⁵) + (0 × 2⁴) + (0 × 2³) + (0 × 2²) + (0 × 2¹) + (1 × 2⁰) = (1)₁₀ <br> If all days of the week are available for a mode, the schedule value will be 127 i.e. (1111111)₂ = (1 × 2⁶) + (1 × 2⁵) + (1 × 2⁴) + (1 × 2³) + (1 × 2²) + (1 × 2¹) + (1 × 2⁰) = (127)₁₀
      example: 127
      type: number
    Workstation:
      description: An object containing workstation information
      properties:
        active:
          description: whether the workstation is active
          type: boolean
        alternativeName:
          description: the alternative name of the workstation
          example: Workstation name 2
          type: string
        departmentId:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: the department ID of the workstation
        id:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: the VelCloud ID of the workstation
        licenceNumber:
          $ref: '#/components/schemas/LicenceNumber'
        name:
          description: the name of the workstation
          example: Workstation name
          type: string
        remoteId:
          description: the Veloce External ID
          type: integer
        type:
          $ref: '#/components/schemas/WorkstationType'
          description: the type of the workstation
    WorkstationExtended:
      allOf:
      - $ref: '#/components/schemas/Workstation'
      description: An object containing workstation information
      properties:
        boardMessage:
          description: the board message name of the workstation
          example: Board message
          type: string
        invoiceMessage:
          description: the invoice message name of the workstation
          example: Invoice message
          type: string
        locationId:
          description: The id of the location.
          format: uuid
          type: string
    WorkstationExtendedArray:
      items:
        $ref: '#/components/schemas/WorkstationExtended'
      type: array
    WorkstationExtendedPaginated:
      description: An object of paginated content
      properties:
        content:
          items:
            $ref: '#/components/schemas/WorkstationExtended'
          type: array
        limit:
          description: The limit of workstation
          example: 250
          type: integer
        offset:
          description: The offset of workstation
          example: 1
          type: integer
        search:
          description: The search string of workstation name.
          example: abc
          type: integer
        size:
          description: The total number of workstation
          example: 1
          type: integer
        total:
          description: the number of total workstation that can be returned
          example: 1
          type: integer
    WorkstationType:
      description: |
        The type of the workstation. Defaults to 0
         >
        | Type | Description     |
        |------|-----------------|
        |  0   | WINDOWS         |
        |  1   | POCKET_PC       |
        |  2   | PREPCODE        |
        |  3   | TABLET_PC       |
        |  4   | FONCTION        |
        |  5   | BAR_CONSOLE     |
        |  6   | IOS             |
        |  7   | BAR_CONSOLE_IOS |
      type: number
    ZoneType:
      description: The name of the zone. Must be one of these values
      enum:
      - TABLE
      - QUICK_SERVICE
      - TAKEOUT
      - DELIVERY
      - QUEUE_LANE
      - RUNNING_BILL
      type: string
  parameters:
    couponCodeParam:
      description: The code (barcode) of the coupon
      in: path
      name: couponCode
      required: true
      schema:
        $ref: '#/components/schemas/CouponBarcode'
    couponTypeParam:
      description: |
        The coupon type
        >
        | Type |   Description   |
        |------|-----------------|
        |  0   | CouponTypeMulti |
        |  1   | CouponTypeSingle|
      example: 1
      in: query
      name: couponType
      schema:
        items:
          type: number
        type: array
    currencyParam:
      description: The currency of the locations to limit the responses to. For example,
        "$" would return only sales of locations that are configured with such a currency.
        if "CAD" would return only sales of locations that are configured with such
        a canadian currency. If not set, the results will contain all sales regardless
        of the currency of the location.
      example:
      - $
      in: query
      name: currency
      required: false
      schema:
        type: string
    groupByRevenueCenterParam:
      description: Whether the sales are grouped by revenue centers.
      in: query
      name: groupByRevenueCenter
      required: false
      schema:
        type: boolean
    invoiceDetailedTaxes:
      description: |
        If this is set to true, the complete taxes configuration will be added to 'taxes'. Tax objects will have the following structure:
          - `id` The VelCloud ID of the tax (UUID).
          - `amount` The tax amount(double).
          - `isVat` Whether the tax is VAT or not (boolean).
          - `active` Whether the tax is active or not in Veloce (boolean).
          - `name` The main name of the tax (string).
          - `alternativeName` The alternative name of the tax (string).
          - `remoteId` The Veloce ID of the tax (integer).
          - `rate` The rate of the tax (double).
          - `taxNumber` The government issued tax number of the tax config (string).
      in: query
      name: detailedTaxes
      schema:
        default: false
        type: boolean
    invoiceIncludes:
      description: Which kind(s) of additional related data to load for each invoice.
        'discount' adds both discount and cash discount.
      in: query
      name: include
      required: false
      schema:
        items:
          enum:
          - items
          - tags
          - payments
          - workstation
          - sellingEmployee
          - carrierEmployee
          - department
          - bigDepartment
          - discount
          - location
          - itemsDepartments
          type: string
        type: array
    kindParam:
      description: |
        Kind/type of group to filter.
        -  0: CORPORATE / ENTERPRISE
        -  1: BANNER
        -  2: CUSTOM
      in: query
      name: kind
      schema:
        $ref: '#/components/schemas/GroupKind'
    langParam:
      description: Indicates the language for the exported document. Only available
        for PDF export
      in: query
      name: lang
      schema:
        default: en
        enum:
        - en
        - fr
        type: string
    limitParam:
      description: The limit of objects data returned.
      example: 250
      in: query
      name: limit
      schema:
        default: 250
        type: integer
    offsetParam:
      description: The offset of objects data returned.
      example: 1
      in: query
      name: offset
      schema:
        default: 0
        type: integer
    orderParam:
      description: Indicates how the results will be ordered.
      in: query
      name: order
      schema:
        default: asc
        enum:
        - asc
        - desc
        type: string
    paginationParam:
      description: Indicates if the result should be paginated
      in: query
      name: pagination
      required: false
      schema:
        type: boolean
    searchParam:
      deprecated: false
      description: Filters the returned object to only get whose names contain the
        given search text.
      in: query
      name: search
      required: false
      schema:
        maxLength: 25
        type: string
    searchParamDeprecated:
      deprecated: true
      description: Filters the returned object to only get whose names contain the
        given search text.
      in: query
      name: search
      required: false
      schema:
        maxLength: 25
        type: string
    sortParam:
      description: Indicates the field used to sort results.
      in: query
      name: sort
      schema:
        default: name
        enum:
        - name
        - alternativeName
        type: string
  responses:
    BadRequest:
      description: Bad Request
    Conflict:
      description: The specified resources conflicts with another resource
    InternalServerError:
      description: Internal Server Error
    NoContent:
      description: No Content
    NotAuthenticated:
      description: Not Authenticated
    NotAuthorized:
      description: Not Authorized
    NotFound:
      description: The specified resource was not found
    TooLarge:
      description: Request or request content is too large. This can also mean there
        are too many results to run your query. Try reducing your location selection,
        date range or adding filters
    Unauthorized:
      description: Unauthorized
    UnprocessableEntity:
      description: The specified entity is syntactically correct and understood, but
        cannot be processed for semantic reasons
