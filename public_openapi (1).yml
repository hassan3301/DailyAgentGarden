          format: date-time
          type: string
        amount:
          description: The amount of the payment transfer.
          example: 123.45
          type: number
        carrierEmployee:
          allOf:
          - $ref: '#/components/schemas/Employee'
          description: The carrier employee linked with the payment transfer. Can
            be null if not included in `include` param.
        carrierEmployeeId:
          description: The id of the employee who signed off on the payment transfer.
          format: uuid
          type: string
        department:
          allOf:
          - $ref: '#/components/schemas/Department'
          description: The department linked with the payment transfer. Can be null
            if not included in `include` param.
        departmentId:
          description: The id of the department of the payment transfer.
          format: uuid
          type: string
        destAmount:
          description: The destination amount of the payment transfer.
          type: number
        destTenderType:
          allOf:
          - $ref: '#/components/schemas/TenderType'
          description: The destination tender type linked with the payment transfer.
            Can be null if not included in `include` param.
        destTenderTypeId:
          description: The id of the destination tender type of the payment transfer.
          format: uuid
          type: string
        employee:
          allOf:
          - $ref: '#/components/schemas/Employee'
          description: Employee linked with the transaction. Can be null if not included
            in `include` param.
        employeeId:
          description: The id of the employee linked with the payment transfer.
          example: 01234567-89ab-cdef-0123-456789abcdef
          format: uuid
          type: string
        id:
          description: The id of the payment transfer.
          example: 01234567-89ab-cdef-0123-456789abcdef
          format: uuid
          type: string
        licenceNumber:
          example: 12345
          type: number
        location:
          allOf:
          - $ref: '#/components/schemas/Location'
          description: The location linked with the payment transfer. Can be null
            if not included in `include` param.
        locationId:
          description: The id of the location.
          example: 01234567-89ab-cdef-0123-456789abcdef
          format: uuid
          type: string
        remoteId:
          description: The remote id of the payment transfer.
          example: 1
          type: number
        sourceTenderType:
          allOf:
          - $ref: '#/components/schemas/TenderType'
          description: The source tender type linked with the payment transfer. Can
            be null if not included in `include` param.
        sourceTenderTypeId:
          description: The id of the source tender type of the payment transfer.
          format: uuid
          type: string
        supplier:
          allOf:
          - $ref: '#/components/schemas/Supplier'
          description: Supplier linked with the transaction. Can be null if not included
            in `include` param.
        supplierId:
          description: The id of the supplier.
          example: 01234567-89ab-cdef-0123-456789abcdef
          format: uuid
          type: string
        transactionLocalTime:
          description: The transaction local time of the payment transfer.
          example: 01234567-89ab-cdef-0123-456789abcdef
          format: date-time
          type: string
        transactionTime:
          description: The transaction time of the payment transfer (UTC).
          example: "2018-01-01T00:00:00Z"
          format: date-time
          type: string
        workstation:
          allOf:
          - $ref: '#/components/schemas/Workstation'
          description: Workstation linked with the transaction. Can be null if not
            included in `include` param.
        workstationId:
          description: The id of the POS linked with the payment transfer.
          example: 01234567-89ab-cdef-0123-456789abcdef
          format: uuid
          type: string
    PaymentWithMode:
      description: A payment with its mode (credit card, cash, etc.)
      properties:
        amount:
          allOf:
          - $ref: '#/components/schemas/Amount'
          description: The amount paid by this payment.
        id:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The identifier of the payment mode.
        paymodeAlternativeName:
          description: The alternative name of the payment mode.
          type: string
        paymodeName:
          description: The name of the payment mode.
          type: string
        surcharge:
          allOf:
          - $ref: '#/components/schemas/Amount'
          description: |
            The surcharge amounts that payment with this paymode.
        transferredTip:
          allOf:
          - $ref: '#/components/schemas/Amount'
          description: |
            The tip amounts that was originally on a payment with this paymode,
            but got transferred to another paymode because of overpay configuration.
    Permission:
      enum:
      - fullAccess
      type: string
    Popup:
      description: An object of popup.
      properties:
        alternativeName:
          description: The alternative name of the popup.
          example: Alternative Popup Name
          type: string
        combinationItems:
          items:
            $ref: '#/components/schemas/PopupCombinationItem'
          type: array
        divisionId:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The id of the division.
        id:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The id of the popup.
        isActive:
          description: The status of the popup.
          example: true
          type: boolean
        licenceNumber:
          description: The licence number of the location owning the popup.
          example: 12345
          type: number
        locationId:
          description: The id of the location the popup belongs to.
          example: 01234567-89ab-cdef-0123-456789abcdef
          format: uuid
          type: string
        minimumPrice:
          description: The minimum price of the popup.
          example: 12
          type: number
        name:
          description: The main name of the popup.
          example: Popup Name
          type: string
        numberOfAllowedSelection:
          description: The number of selections allowed for the popup.
          example: 12
          type: integer
        numberOfTimes:
          description: The number of times before a free selection/free repeats of
            the popup.
          example: 10
          type: integer
        priceCalculationType:
          $ref: '#/components/schemas/PriceCalculationType'
        printAtTheKitchen:
          description: Whether the popup is to be printed at the kitchen.
          example: true
          type: boolean
        printOnReadings:
          description: Whether the popup is to be printed on readings.
          example: true
          type: boolean
        printOnReport:
          description: Whether the popup is to be printed on report.
          example: true
          type: boolean
        regularItems:
          items:
            $ref: '#/components/schemas/PopupRegularItem'
          type: array
        remoteId:
          description: The remote id of the popup.
          example: 1
          type: integer
    PopupCombinationItem:
      description: An object containing a popup combination item information
      properties:
        alternativeName:
          description: The alternative name of the popup combination item
          example: item combo 1
          type: string
        automaticOrderBetweenReplacedItem:
          description: Whether the popup combination item automatically adds an item
            order between replaced items
          example: false
          type: boolean
        id:
          description: The id of the popup combination item
          format: uuid
          type: string
        multiplicator:
          description: The multiplicator of the popup combination item
          example: 1.5
          type: number
        name:
          description: The name of the popup combination item
          example: combination item 1
          type: string
        printOnInvoice:
          description: Whether the popup combination item should be printed on invoices
          example: true
          type: boolean
    PopupRegularItem:
      description: An object containing a popup regular item's information
      properties:
        alternativeName:
          description: The alternative name of the popup regular item
          example: nom popup item regulier
          maximum: 50
          type: string
        automaticOrderBetweenReplacedItem:
          description: Whether the popup regular item automatically adds an item order
            between replaced items
          example: false
          type: boolean
        id:
          description: The id of the popup regular item
          format: uuid
          type: string
        isTaxVat:
          description: Whether the popup regular item has a VAT tax
          example: false
          type: boolean
        kdsColor:
          description: The kitchen display color of the popup regular item
          example: '#FF00FF'
          type: string
        kdsIncludeOnOrderSummary:
          description: Whether the popup regular item should be included on order
            summary in the kitchen display
          example: false
          type: boolean
        kdsSummaryOnly:
          description: Whether the popup regular item is exclusively on the summary
            in the kitchen display
          example: false
          type: boolean
        name:
          description: The name of the popup regular item
          example: popup regular item name
          maximum: 50
          type: string
        printOnInvoice:
          description: Whether the popup regular item should be printed on invoices
          example: true
          type: boolean
        recipeCanVoid:
          description: Whether the popup regular item recipe can be voided
          type: boolean
        recipeExtraCost:
          description: The extra cost for the popup regular item
          example: 2
          type: number
        recipeIsWithServices:
          description: Whether the popup regular item is with services in its recipe
          example: false
          type: boolean
        recipeIsWithVegetable:
          description: Whether the popup regular item has vegetables in its recipe
          example: false
          type: boolean
        recipeItems:
          description: The items of the recipe for the poup regular item
          items:
            $ref: '#/components/schemas/PopupRegularItemRecipeItem'
          type: array
        taxIds:
          description: The ids of the taxes for the popup regular item
          items:
            $ref: '#/components/schemas/UUID'
          type: array
    PopupRegularItemRecipeItem:
      description: An object containing an item information in a popup regular item
        recipe
      properties:
        isSpecialMode:
          description: Whether the popup regular item recipe item is in special mode
          example: false
          type: boolean
        itemId:
          description: The item id of the popup regular item recipe item
          format: uuid
          type: string
        quantity:
          description: The quantity of items for the popup regular item recipe item
          example: 1.5
          type: number
    PosType:
      default: 0
      description: |
        The pos type
        >
        | Type | Description |
        |------|-------------|
        |  0   | Veloce      |
        |  1   | MaitreD     |
      enum:
      - 0
      - 1
      type: number
    PriceCalculationType:
      description: |
        The price calculation type of the popup.
         - 0: free selection
         - 1: free repeats
      example: 0
      type: integer
    PriceLevel:
      description: An object containing the price level information
      example:
        alternativeName: Takeout
        id: 01234567-89ab-cdef-0123-456789abcdef
        isActive: true
        isSpecialMode: false
        licenceNumber: 123456
        locationId: 01234567-89ab-cdef-0123-456789abcdef
        name: Livraison
        remoteId: 2
      properties:
        alternativeName:
          description: the alternative name of the price level
          type: string
        id:
          description: the unique id of the price level
          format: uuid
          type: string
        isActive:
          description: whether the price level is active or not
          type: boolean
        isSpecialMode:
          description: whether the price level relates to a special mode or not
          type: boolean
        licenceNumber:
          description: the licence number that the price level belongs to
          type: number
        locationId:
          description: the id of the location that the price level belongs to
          format: uuid
          type: string
        name:
          description: the main name of the price level
          type: string
        remoteId:
          description: the remote id of the price level
          type: number
      type: object
    Product:
      description: The object that contains information about the product
      properties:
        alternativeName:
          description: The alternative name of the products
          type: string
        copyIfChange:
          description: If a changed regular price on the item has to be copied for
