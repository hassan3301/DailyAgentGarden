  /invoices:
    get:
      description: |
        Returns up to `limit` invoices ordered by `timeSource`, starting at `offset`.
        If no `locationIDs` and no `groupIDs` are specified, invoices for all locations will be returned. The selection
        is always trimmed to `licenceNumber`.
        To get a pdf export of that endpoint, add Content-Type `application/pdf`
        in your request and Velcloud-ClientTime in the headers (required in RFC3339).
        The pdf export is limited to 3000 invoices.
      operationId: getInvoices
      parameters:
      - $ref: '#/components/parameters/invoiceDetailedTaxes'
      - $ref: '#/components/parameters/invoiceIncludes'
      - $ref: '#/components/parameters/paginationParam'
      - $ref: '#/components/parameters/langParam'
      - description: The IDs of groups of locations to get invoices from. Can be provided
          alongside additional locationIDs
        in: query
        name: groupIDs
        required: false
        schema:
          items:
            $ref: '#/components/schemas/UUID'
          type: array
      - description: The locationIDs to get invoices from
        in: query
        name: locationIDs
        required: false
        schema:
          items:
            $ref: '#/components/schemas/UUID'
          type: array
      - description: The licence number(s) to restrict the search to.
        example:
        - 44000
        - 44001
        explode: true
        in: query
        name: licenceNumber
        required: false
        schema:
          items:
            $ref: '#/components/schemas/LicenceNumber'
          type: array
        style: form
      - description: The beginning of the time range to consider.
        example:
        - "2018-01-01T00:00:00Z"
        in: query
        name: from
        required: false
        schema:
          $ref: '#/components/schemas/DateTime'
        style: spaceDelimited
      - description: The excluded end of the time range to consider.
        example:
        - "2018-01-02T23:59:59Z"
        in: query
        name: to
        required: false
        schema:
          $ref: '#/components/schemas/DateTime'
        style: spaceDelimited
      - description: |
          The max number of invoices to return from the given `offset`,
          with a minimum value of 1, and a maximum value of 250.
        in: query
        name: limit
        required: false
        schema:
          type: number
      - description: The rank of the invoice to start searching from, starting at
          0.
        in: query
        name: offset
        required: false
        schema:
          type: number
      - description: Whether to get training invoices or not
        in: query
        name: training
        schema:
          default: false
          type: boolean
      - in: query
        name: timeSource
        schema:
          default: invoiceTime
          description: |
            The time to use to filter results when `from` and/or `to` is provided:
            - invoiceTime: The invoice date configured in Veloce which is either the time the invoice was opened (openTime) or the time the invoice was closed (closeTime).
            - created: The datetime when the invoice was added to the database
            - openTime: The datetime when the invoice was opened
            - closeTime: The datetime when the invoice was closed. This value is not set (1970-01-01 00:00:00) for invoices created on Veloce version < 9.50.0
            - lastUpdated: The datetime for the last invoice update
          enum:
          - invoiceTime
          - created
          - openTime
          - closeTime
          - lastUpdated
          type: string
      - in: query
        name: refund
        schema:
          description: |
            If not specified, all invoices will be returned.
            If refund = true, the endpoint will return all invoices that have a negative balance.
            If refund = false, the endpoint will return all invoices that have a positive or zero total.
          type: boolean
      - in: query
        name: itemRefunds
        schema:
          default: false
          description: |
            If not specified, all invoices will be returned.
            If itemRefunds = true, the endpoint will return all invoices that have at least one refunded item on it.
            itemRefunds = false is not supported.
          type: boolean
      - description: |
          The invoice number to filter.
          Invoice numbers are partially matched from the end of the number.
          If no specified all invoices will be returned.
        in: query
        name: invoiceNumber
        required: false
        schema:
          type: number
      responses:
        "200":
          content:
            application/json:
              schema:
                discriminator:
                  mapping:
                    invoicesArray: '#/components/schemas/ExpandableInvoiceArray'
                    invoicesPaginated: '#/components/schemas/ExpandableInvoicePaginated'
                oneOf:
                - $ref: '#/components/schemas/ExpandableInvoicePaginated'
                - $ref: '#/components/schemas/ExpandableInvoiceArray'
            application/pdf:
              schema:
                description: Pdf binary content
                format: binary
                type: string
          description: OK
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/NotAuthenticated'
        "403":
          $ref: '#/components/responses/NotAuthorized'
        "413":
          $ref: '#/components/responses/TooLarge'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
        "500":
          $ref: '#/components/responses/InternalServerError'
      summary: Get invoices
      tags:
      - invoices
  /invoices/{invoiceID}:
    get:
      description: Returns an invoice by its id. To get a pdf export of that endpoint,
