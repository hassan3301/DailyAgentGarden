    EftTransaction:
      example:
        accountingTime: "2018-01-01T00:00:00Z"
        amount: 1.5
        checkNumber: 1
        concept:
          alternativeName: concept alt name
          clientId: clientId123
          id: 01234567-89ab-cdef-0123-456789abcdef
          name: concept name
          remoteId: 1
        employee:
          departmentId: 0
          id: 01234567-89ab-cdef-0123-456789abcdef
          licenceNumber: 42003
          name: Caissier 1
          remoteId: 0
          sectionId: 255
        eventLocalTime: "2018-01-01T00:00:00Z"
        eventTime: "2018-01-01T00:00:00Z"
        id: 01234567-89ab-cdef-0123-456789abcdef
        lastdigits: 112
        licenceNumber: 44000
        locationId: 01234567-89ab-cdef-0123-456789abcdef
        operation: 13
        remoteId: 1
        revenueCenter:
          alternativeName: revenue center alt name
          clientId: clientId123
          departmentId: 01234567-89ab-cdef-0123-456789abcdef
          id: 01234567-89ab-cdef-0123-456789abcdef
          name: revenue center name
          remoteId: 1
        workstation:
          active: true
          alternativeName: ""
          departmentId: 01234567-89ab-cdef-0123-456789abcdef
          id: 01234567-89ab-cdef-0123-456789abcdef
          licenceNumber: 42003
          name: Caisse 1
          remoteId: 0
          type: 0
      properties:
        accountingTime:
          description: The accounting date of when the eft transaction happened
          format: date-time
          type: string
        amount:
          description: The amout spent before taxes of the eft transaction
          type: number
        checkNumber:
          description: The check number of the eft transaction
          type: number
        concept:
          $ref: '#/components/schemas/ConceptMin'
          description: The concept entity. Will be null if revenueCenter is not included.
          nullable: true
          type: object
        employee:
          $ref: '#/components/schemas/Employee'
          description: The selling employee linked to the eft transaction. Will be
            null if not specified in the includes.
        employeeId:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The id of the employee of the eft transaction
        eventLocalTime:
          description: The local date of when the eft transaction happened
          format: date-time
          type: string
        eventTime:
          description: The UTC date of when the eft transaction happened
          format: date-time
          type: string
        id:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The id of the eft transaction
        lastDigits:
          description: The last digits of the eft transaction
          type: string
        licenceNumber:
          allOf:
          - $ref: '#/components/schemas/LicenceNumber'
          description: The licence number of the eft transaction
        locationId:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The id of the location of the eft transaction
        operation:
          description: |
            The operation type of the eft transaction

            Gift card operations | value
            ---|---
            Prepaid Activation (Activate a new card) | 10
            Prepaid Add (Add money to existing card) | 11
            Prepaid Clear (Take money back from card (and give as cash)) | 12
            Prepaid Void (Generic transaction void (not always supported)) | 15
            Prepaid Purchase | 18
            Prepaid Refund | 19
            Prepaid Activation Void (Void activation) | 26
            Prepaid Add Void (Void refill) | 27
            Prepaid Remove (Remove money from existing card (inverse of refill)) | 31

            Loyalty invoice operations | value
            ---|---
            Point Add (Add points to existing card) | 13
            Point Void (Generic transaction void) | 14
            Point Add Void (Void a redeem) | 29
            Point Activate | 33
          type: number
        remoteId:
          description: The remote id of the eft transaction
          type: number
        revenueCenter:
          $ref: '#/components/schemas/RevenueCenterMin'
          description: The revenue center entity. Will be null if not specified in
            the includes
          nullable: true
          type: object
        workstation:
          $ref: '#/components/schemas/Workstation'
          description: The workstation information linked to the eft transaction.
            Will be null if not specified in the includes.
        workstationId:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The id of the workstation of the eft transaction
