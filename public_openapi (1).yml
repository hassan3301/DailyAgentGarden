    TimeAttendanceDepartment:
      properties:
        code:
          description: the code of the time attendance department
          example: 111
          type: number
        id:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: the unique id of the time attendance department
        licenceNumber:
          description: the licence number that the time attendance department belongs
            to
          example: 123456
          type: number
        locationId:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: the id of the location that the time attendance department
            belongs to
        name:
          description: the name of the time attendance department
          example: time attendance department
          type: string
        payrollNumber:
          description: the payroll number of the time attendance department
          example: payroll number
          type: string
        remoteId:
          description: the remote id of the time attendance department. This value
            is 1-indexed.
          example: 2
