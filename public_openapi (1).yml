

openapi: 3.0.0
info:
  version: 1.0.0
  title: Veloce API
  description: Documentation of the Veloce API, as it is used by the Veloce Analytics
    website.
  x-logo:
    url: https://velocehq.com/wp-content/uploads/2020/02/icone-for-website-300x108.png
    altText: Veloce logo
servers:
- url: https://api.posveloce.com
security:
- bearerAuth: []
tags:
- name: authentication
- name: big divisions
- name: coupons
- name: discounts
- name: divisions
- name: employees
- name: groups
- name: indicators
- name: invoices
- name: items
- name: locations
- name: modes
- name: permissions
- name: sales
- name: suppliers
- name: taxes
- name: tender types
- name: transactions
- name: users
- name: workstations
paths:
  /bigDivisions:
    get:
      description: Returns a list of big divisions. If no `locationIDs` and `groupIDs`
        are specified, big divisions for all locations will be returned. The remote
        IDs are 1-indexed in this endpoint.
      operationId: getBigDivisions
      parameters:
      - description: The ids of the locations to get the big divisions from
        in: query
        name: locationIDs
        required: false
        schema:
          items:
            $ref: '#/components/schemas/UUID'
          type: array
      - description: The ids of groups of locations to get big divisions from. Can
          be provided alongside additional locationIDs
        in: query
        name: groupIDs
        required: false
        schema:
          items:
            $ref: '#/components/schemas/UUID'
          type: array
      - description: Indicates the field used to sort results.
        in: query
        name: sort
        schema:
          default: name
          enum:
          - name
          - alternativeName
          type: string
      - description: Indicates how the results will be ordered.
        in: query
        name: order
        schema:
          default: asc
          enum:
          - asc
          - desc
          type: string
      - description: The max number of big divisions to return from the given `offset`,
          with a minimum value of 1 and maximum of 250
        in: query
        name: limit
        required: false
        schema:
          type: number
      - description: The rank of the big divisions to start searching from, starting
          at 0
        in: query
        name: offset
        required: false
        schema:
          type: number
      - description: Whether or not the response must contain the pagination information
        in: query
        name: pagination
        required: false
        schema:
          default: false
          type: boolean
      - description: Filters the returned object to only get big divisions whose names
          contain the given search text
        in: query
        name: search
        required: false
        schema:
          type: string
      - description: Which kind(s) of additional related data to load for each big
          division.
        in: query
        name: include
        required: false
        schema:
          enum:
          - tax
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/BigDivisionWithLocationIDPaginated'
                - $ref: '#/components/schemas/BigDivisionWithLocationIDArray'
          description: OK
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/NotAuthenticated'
        "403":
          $ref: '#/components/responses/NotAuthorized'
        "500":
          $ref: '#/components/responses/InternalServerError'
      summary: Get big divisions
      tags:
      - big divisions
  /coupons/{couponID}:
    get:
      description: This endpoint is to be used only by the Veloce POS to validate
        a given coupon is valid.
      operationId: getCouponById
      parameters:
      - description: The id of the coupon
        in: path
        name: couponID
        required: true
        schema:
          type: string
      - description: The licence number
        example: 12345
        in: header
        name: VEL-LICENCE
        required: true
        schema:
          type: number
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coupon'
          description: OK.
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/NotAuthenticated'
        "403":
          $ref: '#/components/responses/NotAuthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "410":
          description: The coupon has expired
        "500":
          $ref: '#/components/responses/InternalServerError'
      security:
      - locationOnly: []
      summary: Get non-expired coupon
      tags:
      - coupons
  /discounts:
    get:
      operationId: getDiscounts
      parameters:
      - description: The ids of the location(s) to get discounts for.
        in: query
        name: locationIDs
        required: false
        schema:
          $ref: '#/components/schemas/UUID'
      - description: The ids of groups of locations to get discounts from. Can be
          provided alongside additional locationIDs.
        in: query
        name: groupIDs
        required: false
        schema:
          $ref: '#/components/schemas/UUID'
      - description: The max number of discounts to return from the given `offset`,
          with a minimum value of 1 and maximum of 250.
        in: query
        name: limit
        required: false
        schema:
          type: number
      - description: The rank of the discounts to start searching from, starting at
          0.
        in: query
        name: offset
        required: false
        schema:
          type: number
      - description: Whether or not the response must contain the pagination information.
          If enabled, `limit` is defaulted to 250 when not set.
        in: query
        name: pagination
        required: false
        schema:
          default: false
          type: boolean
      - description: Filters the returned object to only get discounts whose names
          contain the given search text.
        in: query
        name: search
        required: false
        schema:
          type: string
      - description: Which kind(s) of additional related data to load for each discount.
        in: query
        name: include
        required: false
        schema:
          enum:
          - taxesCategory
          - items
          - subCategories
          - availability
          type: string
      - description: Indicates the field used to sort results.
        in: query
        name: sort
        schema:
          default: name
          enum:
          - name
          - alternativeName
          type: string
      - description: Indicates how the results will be ordered.
        in: query
        name: order
        schema:
          default: asc
          enum:
          - asc
          - desc
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                discriminator:
                  mapping:
                    discountArray: '#/components/schemas/DiscountArray'
                    discountPaginated: '#/components/schemas/DiscountPaginated'
                oneOf:
                - $ref: '#/components/schemas/DiscountPaginated'
                - $ref: '#/components/schemas/DiscountArray'
          description: An array of discounts.
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/NotAuthenticated'
        "403":
          $ref: '#/components/responses/NotAuthorized'
        "500":
          $ref: '#/components/responses/InternalServerError'
      summary: Get discounts
      tags:
      - discounts
  /discounts/{discountID}:
    get:
      operationId: getDiscountById
      parameters:
      - description: The id of the discount to get.
        in: path
        name: discountID
        required: true
        schema:
          $ref: '#/components/schemas/UUID'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Discount'
          description: a discount
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/NotAuthenticated'
        "403":
          $ref: '#/components/responses/NotAuthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'
      summary: Get a discount by its id
      tags:
      - discounts
  /discounts/{discountID}/schedule:
    get:
      deprecated: true
      description: |
        This endpoint is deprecated. Get the discount schedule availability by modes.
      operationId: getDiscountSchedule
      parameters:
      - description: The id of the discount to search the schedule for
        in: path
        name: discountID
        required: true
        schema:
          $ref: '#/components/schemas/UUID'
      - description: The max number of schedules to return from the given `offset`,
          with a minimum value of 1 and maximum of 250
        in: query
        name: limit
        required: false
        schema:
          default: 250
          type: number
      - description: The rank of the schedules to start searching from, starting at
          0
        in: query
        name: offset
        required: false
        schema:
          default: 0
          type: number
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/DiscountSchedule'
                type: array
          description: An array of discount schedules
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/NotAuthenticated'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'
      summary: Get discount schedule
      tags:
      - discounts
  /divisions:
    get:
      description: Returns a list of divisions. If no `locationIDs` and `groupIDs`
        are specified, divisions for all locations will be returned. The remote IDs
        are 1-indexed in this endpoint.
      operationId: getDivisions
      parameters:
      - description: The ids of the locations to get the divisions from
        in: query
        name: locationIDs
        required: false
        schema:
          items:
            $ref: '#/components/schemas/UUID'
          type: array
      - description: The ids of groups of locations to get divisions from. Can be
          provided alongside additional locationIDs
        in: query
        name: groupIDs
        required: false
        schema:
          items:
            $ref: '#/components/schemas/UUID'
          type: array
      - description: Whether or not the response must contain the pagination information
        in: query
        name: pagination
        required: false
        schema:
          default: false
          type: boolean
      - description: Filters the returned object to only get divisions whose names
          contain the given search text
        in: query
        name: search
        required: false
        schema:
          type: string
      - description: Indicates the field used to sort results.
        in: query
        name: sort
        schema:
          default: name
          enum:
          - name
          - alternativeName
          type: string
      - description: Indicates how the results will be ordered.
        in: query
        name: order
        schema:
          default: asc
          enum:
          - asc
          - desc
          type: string
      - description: The max number of divisions to return from the given `offset`,
          with a minimum value of 1 and maximum of 250
        in: query
        name: limit
        required: false
        schema:
          type: number
      - description: The rank of the divisions to start searching from, starting at
          0.
        in: query
        name: offset
        required: false
        schema:
          type: number
      - description: Which kind(s) of additional related data to load for each division.
        in: query
        name: include
        required: false
        schema:
          enum:
          - taxes
          - priceQuantities
          - tipRedistributions
          - generalLedgerNumbers
          type: string
      - description: |
          Indicates the status of the division to retrieve.
          If not specified all division will be returned
        in: query
        name: isActive
        required: false
        schema:
          type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/DivisionWithLocationPaginated'
                - $ref: '#/components/schemas/DivisionWithLocationArray'
          description: OK.
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/NotAuthenticated'
        "403":
          $ref: '#/components/responses/NotAuthorized'
        "500":
          $ref: '#/components/responses/InternalServerError'
      summary: Get divisions
      tags:
      - divisions
  /divisions/{divisionID}:
    get:
      description: Get a division by its ID. The remote IDs are 1-indexed in this
        endpoint.
      operationId: getDivisionByID
      parameters:
      - description: The id of the division
        in: path
        name: divisionID
        required: true
        schema:
          $ref: '#/components/schemas/UUID'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DivisionWithLocation'
          description: The division
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/NotAuthenticated'
        "403":
          $ref: '#/components/responses/NotAuthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'
      summary: Get a division by its id
      tags:
      - divisions
  /employees:
    get:
      description: This returns employees for all or specified locations.
      operationId: getEmployees
      parameters:
      - description: The ids of the locations to get the employees from. If not specified,
          all locations will be returned
        in: query
        name: locationIDs
        required: false
        schema:
          items:
            $ref: '#/components/schemas/UUID'
          type: array
      - description: The VelCloud ID of the employee to get
        in: query
        name: employeeId
        required: false
        schema:
          items:
            $ref: '#/components/schemas/UUID'
          type: array
      - deprecated: true
        description: Any employee containing this name or part of name will be returned.
          Not case sensitive. This is deprecated by Search.
        example: ROY
        in: query
        name: name
        required: false
        schema:
          type: string
      - description: The Veloce ID of the employee(s) to get
        in: query
        name: remoteId
        required: false
        schema:
          example: 1
          type: integer
      - description: Filters the returned object to only get the employees whose names
          contain the given search text.
        in: query
        name: search
        required: false
        schema:
          type: string
      - description: Indicates how the results will be ordered.
        in: query
        name: order
        schema:
          default: asc
          enum:
          - asc
          - desc
          type: string
      - description: |
          The max number of employees to return from the given `offset`,
          with a minimum value of 1, and a maximum value of 250.
        in: query
        name: limit
        required: false
        schema:
          default: 250
          maximum: 250
          minimum: 1
          type: number
      - description: The rank of the employee to start searching from, starting at
          0.
        in: query
        name: offset
        required: false
        schema:
          default: 0
          type: number
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/EmployeeExtended'
                type: array
          description: OK
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/NotAuthenticated'
        "403":
          $ref: '#/components/responses/NotAuthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'
      summary: Get employees
      tags:
      - employees
  /groups:
    get:
      operationId: getGroups
      parameters:
      - description: The limit of returned groups
        example: 250
        limit: null
        type: integer
      - description: The offset of returned groups
        example: 1
        offset: null
        type: integer
      - description: Indicates the field used to sort results. If sort on `locationCount`
          or `userCount` the analytics will be included
        in: query
        name: sort
        schema:
          default: name
          enum:
          - name
          - kind
          - userCount
          - locationCount
          type: string
      - description: The group names to filter
        in: query
        name: name
        schema:
          maxLength: 25
          type: string
      - description: Which kind(s) of additional related data to load for the group.
        in: query
        name: include
        required: false
        schema:
          items:
            enum:
            - analytics
            type: string
          type: array
      - $ref: '#/components/parameters/kindParam'
      - $ref: '#/components/parameters/orderParam'
      - $ref: '#/components/parameters/searchParamDeprecated'
      - $ref: '#/components/parameters/paginationParam'
      - $ref: '#/components/parameters/limitParam'
      - $ref: '#/components/parameters/offsetParam'
      responses:
        "200":
          content:
            application/json:
              schema:
                discriminator:
                  mapping:
                    groupArray: '#/components/schemas/GroupArray'
                    groupPaginated: '#/components/schemas/GroupPaginated'
                oneOf:
                - $ref: '#/components/schemas/GroupPaginated'
                - $ref: '#/components/schemas/GroupArray'
          description: OK
        "401":
          $ref: '#/components/responses/NotAuthenticated'
        "500":
          $ref: '#/components/responses/InternalServerError'
      summary: Get groups
      tags:
      - groups
  /groups/{groupID}:
    get:
      operationId: getGroupById
      parameters:
      - description: The id of the group
        in: path
        name: groupID
        required: true
        schema:
          $ref: '#/components/schemas/UUID'
      - description: Which kind(s) of additional related data to load for each group.
        in: query
        name: include
        required: false
        schema:
          enum:
          - createdByUser
          - lastUpdatedByUser
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
          description: OK
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/NotAuthenticated'
        "403":
          $ref: '#/components/responses/NotAuthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'
      summary: Get group by id
      tags:
      - groups
  /groups/{groupID}/coupons:
    get:
      description: |-
        Get all coupons belonging to a group.
        To get an excel report of that endpoint, add Content-Type `application/vnd.openxmlformats-officedocument.spreadsheetml.sheet` in your request and Velcloud-ClientTime in the headers (required in RFC3339).
      operationId: getCouponsByGroupId
      parameters:
      - description: The id of the group
        in: path
        name: groupID
        required: true
        schema:
          $ref: '#/components/schemas/UUID'
      - description: The coupon name to filter. The coupon name is partially matched.
        example: Coupon name
        in: query
        name: name
        required: false
        schema:
          type: string
      - description: Whether the coupon is active or not.
        in: query
        name: isActive
        required: false
        schema:
          type: boolean
      - $ref: '#/components/parameters/couponTypeParam'
      - description: Filters the returned object to only get coupons codes whose codes
          contain the given search text.
        in: query
        name: search
        required: false
        schema:
          type: string
      - description: Indicates the field used to sort results.
        in: query
        name: sort
        schema:
          default: code
          enum:
          - code
          - isActive
          - expires
          - name
          - plu1
          - plu1Amount
          - plu2
          - plu2Amount
          - redeemed
          - couponType
          type: string
      - $ref: '#/components/parameters/orderParam'
      - $ref: '#/components/parameters/paginationParam'
      - $ref: '#/components/parameters/limitParam'
      - $ref: '#/components/parameters/offsetParam'
      responses:
        "200":
          content:
            application/json:
              schema:
                discriminator:
                  mapping:
                    tableSectionArray: '#/components/schemas/CouponArray'
                    tableSectionPaginated: '#/components/schemas/CouponPaginated'
                oneOf:
                - $ref: '#/components/schemas/CouponPaginated'
                - $ref: '#/components/schemas/CouponArray'
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                format: binary
                type: string
          description: OK
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/NotAuthenticated'
        "403":
          $ref: '#/components/responses/NotAuthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'
      summary: Get groups coupons
      tags:
      - coupons
  /groups/{groupID}/coupons/{couponCode}:
    get:
      operationId: getCouponByGroupIDAndCode
      parameters:
      - description: The id of the group
        in: path
        name: groupID
        required: true
        schema:
          $ref: '#/components/schemas/UUID'
      - $ref: '#/components/parameters/couponCodeParam'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coupon'
          description: OK
        "401":
          $ref: '#/components/responses/NotAuthenticated'
        "403":
          $ref: '#/components/responses/NotAuthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'
      summary: Get coupon
      tags:
      - coupons
  /groups/{groupID}/locations:
    get:
      operationId: getLocationsByGroupId
      parameters:
      - description: The id of the group
        in: path
        name: groupID
        required: true
        schema:
          $ref: '#/components/schemas/UUID'
      - description: Which kind(s) of additional related data to load for each group.
        in: query
        name: include
        required: false
        schema:
          enum:
          - location
          type: string
      - description: The name of location to filter. The location name is partially
          matched.
        in: query
        name: name
        required: false
        schema:
          type: string
      - description: The address of location to filter. The location address is partially
          matched.
        in: query
        name: address
        required: false
        schema:
          type: string
      - description: The version number of the locations to filter. Send 0.0.0 for
          locations with versions under 9.53.1 (those don't send their version number
          to the cloud). The location version is partially matched.
        in: query
        name: version
        required: false
        schema:
          type: string
      - description: Indicates the field used to sort results.
        in: query
        name: sort
        schema:
          default: name
          enum:
          - name
          - address
          - version
          type: string
      - $ref: '#/components/parameters/orderParam'
      - $ref: '#/components/parameters/paginationParam'
      - $ref: '#/components/parameters/limitParam'
      - $ref: '#/components/parameters/offsetParam'
      responses:
        "200":
          content:
            application/json:
              schema:
                discriminator:
                  mapping:
                    groupArray: '#/components/schemas/GroupLocationArray'
                    groupPaginated: '#/components/schemas/GroupLocationPaginated'
                oneOf:
                - $ref: '#/components/schemas/GroupLocationPaginated'
                - $ref: '#/components/schemas/GroupLocationArray'
          description: OK
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/NotAuthenticated'
        "403":
          $ref: '#/components/responses/NotAuthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'
      summary: Get locations attached to a group
      tags:
      - groups
  /groups/{groupID}/permissions:
    get:
      operationId: getGroupPermissions
      parameters:
      - description: The id of the group
        in: path
        name: groupID
        required: true
        schema:
          $ref: '#/components/schemas/UUID'
      - $ref: '#/components/parameters/paginationParam'
      - $ref: '#/components/parameters/limitParam'
      - $ref: '#/components/parameters/offsetParam'
      - $ref: '#/components/parameters/orderParam'
      - description: Indicates the field used to sort results.
        in: query
        name: sort
        schema:
          default: fullName
          enum:
          - fullName
          - enabled
          - permission
          type: string
      - description: Filters the returned object to only get those where full name
          contain the given search text.
        in: query
        name: fullName
        required: false
        schema:
          maxLength: 25
          type: string
      - description: Filters the returned object to only get those that match the
          status.
        in: query
        name: enabled
        required: false
        schema:
          type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                discriminator:
                  mapping:
                    userPermissionsArray: '#/components/schemas/UserWithExpandableUserPermissionsArray'
                    userPermissionsPaginated: '#/components/schemas/UserWithExpandableUserPermissionsPaginated'
                oneOf:
                - $ref: '#/components/schemas/UserWithExpandableUserPermissionsPaginated'
                - $ref: '#/components/schemas/UserWithExpandableUserPermissionsArray'
          description: OK.
        "401":
          $ref: '#/components/responses/NotAuthenticated'
        "403":
          $ref: '#/components/responses/NotAuthorized'
        "404":
