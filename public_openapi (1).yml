  /transactions/itemCorrections:
    get:
      description: |
        Only available for Veloce version 9.61 and onwards.
        Returns item corrections over a time range. A correction is an item removed from an order, not already sent to kitchen.
        If no `locationIDs` and no `groupIDs` are specified, item corrections for all locations will be returned.
      operationId: getTransactionsItemCorrections
      parameters:
      - description: The beginning of the time range to consider
        example:
        - "2018-01-01T00:00:00Z"
        in: query
        name: from
        required: true
        schema:
          $ref: '#/components/schemas/DateTime'
        style: spaceDelimited
      - description: The excluded end of the time range to consider
        example:
        - "2018-01-01T23:59:59Z"
        in: query
        name: to
        required: true
        schema:
          $ref: '#/components/schemas/DateTime'
        style: spaceDelimited
      - description: The max number of item corrections to return from the given `offset`,
          with a minimum value of 1 and maximum of 250.
        in: query
        name: limit
        required: false
        schema:
          default: 250
          type: number
      - description: The rank of the item corrections to start searching from, starting
          at 0.
        in: query
        name: offset
        required: false
        schema:
          default: 0
          type: number
      - description: The ids of the locations to get the sales from
        in: query
        name: locationIDs
        required: false
        schema:
          items:
            $ref: '#/components/schemas/UUID'
          type: array
      - description: The ids of groups of locations to get sales from. Can be provided
          alongside additional `locationIDs`
        in: query
        name: groupIDs
        required: false
        schema:
          items:
            $ref: '#/components/schemas/UUID'
          type: array
      - description: The ids of employees to exclusively get
        in: query
        name: employeeIDs
        required: false
        schema:
          items:
            $ref: '#/components/schemas/UUID'
          type: array
      - in: query
        name: timeSource
        required: false
        schema:
          default: accounting
          description: |
            The time to use to filter results when `from` and/or `to` is provided:
            - accounting: The fiscal date of the item correction
            - event: The UTC event date of the item correction
            - eventLocal: The local event date of the item correction
          enum:
          - accounting
          - event
          - eventLocal
          type: string
      - description: Which kind(s) of additional related data to load for each item
          correction. `productComplete` includes the division and the big division
          info of the item.
        in: query
        name: include
        required: false
        schema:
          enum:
          - product
          - productComplete
          - workstation
          - employee
          - location
          type: string
      - description: |
          Defines how the data will be sorted.
          - employee have to be in include if employee is selected.
          - product or productComplete have to be in include if division is selected.
        in: query
        name: sort
        required: false
        schema:
          default: timeSource
          enum:
          - timeSource
          - employee
          - division
          type: string
      - description: Defines how the sorted data will be ordered.
        in: query
        name: order
        required: false
        schema:
          default: asc
          enum:
          - asc
          - desc
          type: string
      - $ref: '#/components/parameters/currencyParam'
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ItemCorrection'
                type: array
          description: An array of objects containing the item corrections
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/NotAuthenticated'
        "403":
          $ref: '#/components/responses/NotAuthorized'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
        "500":
          $ref: '#/components/responses/InternalServerError'
      summary: Get item corrections
      tags:
      - transactions
