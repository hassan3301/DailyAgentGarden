          type: string
        name:
          description: The name of the mix match.
          example: Mix Match Name
          type: string
        priceConfigurations:
          description: An array of mix match price configurations.
          items:
            $ref: '#/components/schemas/MixMatchPriceConfigurations'
          type: array
        remoteId:
          description: The remote id of the mix match.
          example: 1
          type: integer
    MixMatchActivation:
      description: An object of mix match activation.
      properties:
        endDate:
          description: The end date of the mix match activation.
          example: "2011-01-17T00:00:00Z"
          format: date-time
          type: string
        endTime:
          description: The end time of the mix match activation.
          example: "10:00:00"
          format: time
          type: string
        id:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The id of the mix match activation.
        startDate:
          description: The start date of the mix match activation.
          example: "2011-01-17T00:00:00Z"
          format: date-time
          type: string
        startTime:
          description: The start time of the mix match activation.
          example: "10:00:00"
          format: time
          type: string
        weekday:
          $ref: '#/components/schemas/WeekdayType'
          description: The weekday of the mix match activation.
    MixMatchPriceConfigurations:
      properties:
        amount:
          description: Indicates the price applied.
          example: 10.5
          type: number
        id:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The id of the mix match price configuration.
        quantity:
          description: Indicates the minimum quantity for the mix match price applies.
          example: 4
          type: number
        totalPrice:
          description: Indicates whether or not the price applies on the total or
            per item.
          type: boolean
    Mode:
      description: An object containing the mode information
      properties:
        alternativeName:
          description: The alternative name of the mode
          example: 5H00-11H00
          type: string
        availability:
          description: The mode availabilities.  Can be null if not included in `include`
            param. Not all endpoints may support this.
          items:
            $ref: '#/components/schemas/ModeAvailability'
          type: array
        id:
          description: The id of the mode
          example: 01234567-89ab-cdef-0123-456789abcdef
          format: uuid
          type: string
        isActive:
          description: whether the mode is active or not
          example: true
          type: boolean
        licenceNumber:
          description: The licenceNumber of the location owning the mode
          example: 12345
          type: number
        locationId:
          description: The id of the location that the mode belongs to
          example: 01234567-89ab-cdef-0123-456789abcdef
          format: uuid
          type: string
        name:
          description: The name of the mode
          example: 5H00-11H00
          type: string
        remoteId:
          description: The remote id of the mode
          example: 0
          type: number
      type: object
    ModeArray:
      items:
        allOf:
        - $ref: '#/components/schemas/Mode'
          type: array
    ModeAvailability:
      description: An object of mode availability information.
      properties:
        endTime:
          description: The end time of the availability of the mode.
          example: "17:00:00"
          format: time
          type: string
        startTime:
          description: The starting time of the availability of the mode.
          example: "09:00:00"
          format: time
          type: string
        weekday:
          description: The day of the availability. The days are from Sunday (0) to
            Saturday (6)
          example: 1
          maximum: 6
          minimum: 0
          type: number
    ModePaginated:
      properties:
        content:
          items:
            $ref: '#/components/schemas/Mode'
          type: array
        limit:
          description: The limit of returned modes
          example: 250
          type: integer
        offset:
          description: The offset of returned modes
          example: 1
          type: integer
        size:
          description: The size of returned modes in content
          example: 1
          type: integer
        total:
          description: The total number of modes
          example: 1
          type: integer
    MultilingualObject:
      properties:
        alternativeName:
          description: the name in the second language supported by the location
          type: string
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
    PaymentTransfer:
      properties:
        accountingTime:
          description: The accounting time of the payment transfer.
