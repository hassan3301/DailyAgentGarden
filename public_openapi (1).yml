          type: number
      type: object
    TimeAttendanceShift:
      properties:
        id:
          description: the unique id of the time attendance shift
          example: 01234567-89ab-cdef-0123-456789abcdef
          format: uuid
          type: string
        licenceNumber:
          description: the licence number that the time attendance shift belongs to
          example: 123456
          type: number
        locationId:
          description: the id of the location that the time attendance shift belongs
            to
          example: 01234567-89ab-cdef-0123-456789abcdef
          format: uuid
          type: string
        name:
          description: the name of the time attendance shift
          example: time attendance shift
          type: string
        remoteId:
          description: the remote id of the time attendance shift
          example: 2
          type: number
      type: object
    TokenContainer:
      example:
        token: 01234567-89ab-cdef-0123-456789abcdef
      properties:
        token:
          description: |
            the bearer access token to pass in the `Authorization` header for accessing secured endpoints
          format: JWT
          type: string
    TransactionsIndicator:
      properties:
        currency:
          description: The currency of the transaction indicator
          example: $
          type: string
        detailedCurrency:
          allOf:
          - $ref: '#/components/schemas/DetailedCurrency'
          description: An object containing the detailed currency. Can be null in
            some rare exceptionnal cases where a country might not have an valid address
            (therefore an invalid country code).
          nullable: true
          type: object
        drawerOpenings:
          description: The total number of drawer opens
          example: 10
          type: number
        giftCardLoadsAmount:
          allOf:
          - $ref: '#/components/schemas/Amount'
          description: The sum of eft transactions with operations related to gift
            card loads
        itemCorrections:
          description: The total number of item corrections
          example: 20
          type: number
        itemCorrectionsAmount:
          allOf:
          - $ref: '#/components/schemas/Amount'
          description: The sum of item corrections
        loyaltiesAmount:
          allOf:
          - $ref: '#/components/schemas/Amount'
          description: The sum of eft transactions with operations related to loyalties
        paidOuts:
          description: The total number of paid outs
          example: 20
          type: number
        paidOutsAmount:
          allOf:
          - $ref: '#/components/schemas/Amount'
          description: The sum of paid outs
        refunds:
          description: The total number of refunds
          example: 20
          type: number
        refundsAmount:
          allOf:
          - $ref: '#/components/schemas/Amount'
          description: The sum of refunds
        voids:
          description: The total number of voids
          example: 20
          type: number
        voidsAmount:
