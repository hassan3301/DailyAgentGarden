        divisionId:
          description: The ID of the division linked to the product
          format: uuid
          type: string
        id:
          $ref: '#/components/schemas/UUID'
          description: The id of the products
        isActive:
          description: Whether or not the product is active
          type: boolean
        isAvailable:
          description: Whether the item is available or not.
          type: boolean
        itemType:
          $ref: '#/components/schemas/ItemType'
        kind:
          allOf:
          - $ref: '#/components/schemas/ItemKind'
          description: the kind of product
        licenceNumber:
          $ref: '#/components/schemas/LicenceNumber'
        locationId:
          description: The Id of the location linked to the item
          format: uuid
          type: string
        name:
          description: The main name of the products
          type: string
        plu1:
          description: The first price look-up code of the products. Can be null
          type: string
        plu2:
          description: The second price look-up code of the products. Can be null
          type: string
        regularPrice:
          description: The regular price of the item. Can be null if never configured
          type: number
        remoteId:
          description: The remote ID of the products
          type: integer
    ProductDeprecated:
      description: The object that contains information about the product
      properties:
        id:
          $ref: '#/components/schemas/UUID'
          description: The id of the products
        kind:
          allOf:
          - $ref: '#/components/schemas/ItemKind'
          description: the kind of product
        nameAlt:
          description: The alternative name of the products
          type: string
        nameMain:
          description: The main name of the products
          type: string
        plu1:
          description: The first price look up of the products. Can be null
          type: string
        plu2:
          description: The second price look up of the products. Can be null
          type: string
        remoteId:
          description: The remote ID of the products
          type: integer
    RedirectionTable:
