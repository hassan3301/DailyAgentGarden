        content:
          items:
            $ref: '#/components/schemas/SalesDepartment'
          type: array
        limit:
          description: The limit of returned sales department
          example: 250
          type: integer
        offset:
          description: The offset of returned sales department
          example: 1
          type: integer
        size:
          description: the size of returned sales department
          example: 1
          type: integer
        total:
          description: the total of all sales department
          example: 1
          type: integer
    SalesDetailed:
      allOf:
      - $ref: '#/components/schemas/CurrencyHolder'
      - properties:
          bigDivision:
            $ref: '#/components/schemas/MultilingualObject'
          detailedCurrency:
            allOf:
            - $ref: '#/components/schemas/DetailedCurrency'
            description: An object containing the detailed currency. Can be null in
              some rare exceptionnal cases where a country might not have an valid
              address (therefore an invalid country code).
            nullable: true
            type: object
          division:
            $ref: '#/components/schemas/MultilingualObject'
          invoiceAccountingTime:
