            $ref: '#/components/schemas/ExpandableUserPermission'
          type: array
        locations:
          items:
            $ref: '#/components/schemas/ExpandableUserPermission'
          type: array
    FloorPlan:
      example:
        alternativeName: P1
        id: 01234567-89ab-cdef-0123-456789abcdef
        licenceNumber: 123456
        locationId: 01234567-89ab-cdef-0123-456789abcdef
        name: Plan 1
        remoteId: 2
      properties:
        alternativeName:
          description: the alternative name of the floor plan
          type: string
        id:
          description: the unique id of the floor plan
          format: uuid
          type: string
        licenceNumber:
          description: the licence number that the floor plan belongs to
          type: number
        locationId:
          description: the id of the location that the floor plan belongs to
          format: uuid
          type: string
        name:
          description: the main name of the floor plan
          type: string
        remoteId:
          description: the remote id of the floor plan
          type: number
      type: object
    Group:
      properties:
        analytics:
          $ref: '#/components/schemas/GroupAnalytics'
        created:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: The datetime when the group was inserted into the VelCloud
            database.
        createdBy:
          $ref: '#/components/schemas/UUID'
          description: The id of the user who created the group.
          nullable: true
        createdByUser:
          $ref: '#/components/schemas/User'
          description: The user who created this group. It's an object of type User.
            Will be null if not specified in the includes. Not all endpoints may support
            this.
          nullable: true
        id:
          $ref: '#/components/schemas/UUID'
        kind:
          $ref: '#/components/schemas/GroupKind'
          description: Kind/type of group
        lastUpdated:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: The datetime for the last group update.
        lastUpdatedBy:
          $ref: '#/components/schemas/UUID'
          description: The id of the user who updated the group.
          nullable: true
        lastUpdatedByUser:
          $ref: '#/components/schemas/User'
          description: The user who last updated this user. Will be null if not specified
            in the includes. Not all endpoints may support this.
          nullable: true
        logo:
          description: The url of the uploaded location logo.
          example: https://www.host.com/logo.jpeg
          type: string
        name:
          type: string
        parentId:
          $ref: '#/components/schemas/UUID'
          description: Id of the parent group if this group belongs to another
    GroupAnalytics:
      description: The analytics data of the group. Only provided if specified in
        include. Not all endpoints may support this.
      properties:
        locations:
          description: The number of locations linked to the group.
          type: number
        users:
          description: The number of users linked to the group.
          type: number
    GroupArray:
      items:
        $ref: '#/components/schemas/Group'
      type: array
    GroupKind:
      description: |
        -  0: CORPORATE / ENTERPRISE
        -  1: BANNER
        -  2: CUSTOM
      enum:
      - 0
      - 1
      - 2
      type: number
    GroupLocation:
      properties:
        groupId:
          $ref: '#/components/schemas/UUID'
        licenceNumber:
          $ref: '#/components/schemas/LicenceNumber'
        location:
          $ref: '#/components/schemas/LocationMin'
          description: The location who is attached to the group. Will be null if
            not specified in the includes.
          nullable: true
          type: object
        locationId:
          $ref: '#/components/schemas/UUID'
          description: The Id of the location linked to the group
    GroupLocationArray:
      items:
        $ref: '#/components/schemas/GroupLocation'
      type: array
    GroupLocationPaginated:
      description: An object of paginated content.
      properties:
        content:
          items:
            $ref: '#/components/schemas/GroupLocation'
          type: array
        limit:
          description: The limit of attached location to a group.
          example: 250
          type: integer
        offset:
          description: The offset of attached locations to a group.
          example: 1
          type: integer
        size:
          description: The size of attached locations to a group.
          example: 1
          type: integer
        total:
          description: The total number of attached locations to a group.
          example: 1
          type: integer
    GroupPaginated:
      description: An object of group paginated content
      properties:
        content:
          items:
            $ref: '#/components/schemas/Group'
          type: array
        limit:
          description: The limit of groups returned.
          example: 250
          type: integer
        offset:
          description: The offset of groups returned.
          example: 1
          type: integer
        search:
          description: The search string of groups name.
          example: desc
          type: string
        size:
          description: The total number of groups returned.
          example: 1
          type: integer
        total:
          description: The total number of groups that can be returned.
          example: 1
          type: integer
    GroupProduct:
      example:
        groupId: 01234567-89ab-cdef-0123-456789abcdef
        productCode: COUPONS
      properties:
        groupId:
          $ref: '#/components/schemas/UUID'
        productCode:
          description: Code of the product linked to the group
          type: string
    HourlySales:
      allOf:
      - $ref: '#/components/schemas/CurrencyHolder'
      - properties:
          detailedCurrency:
            allOf:
            - $ref: '#/components/schemas/DetailedCurrency'
            description: An object containing the detailed currency. Can be null in
              some rare exceptionnal cases where a country might not have an valid
              address (therefore an invalid country code).
            nullable: true
          invoiceLocalTime:
            allOf:
            - $ref: '#/components/schemas/DateTime'
            description: the timestamp the invoice was produced as if it had been
              produced in the UTC timezone
          invoiceTime:
            allOf:
            - $ref: '#/components/schemas/DateTime'
            description: the invoice date configured in Veloce which is either the
              time the invoice was opened (openTime) or the time the invoice was closed
              (closeTime).
          quantity:
            description: the number of items sold
            example: 3
            type: integer
          salesAmount:
            allOf:
            - $ref: '#/components/schemas/Amount'
        type: object
    IncludedItem:
      properties:
        id:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The id of the included item.
        itemId:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The item id of the included item.
        ownerItemId:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The id of the item that owns the included item.
        price:
          description: The price of the included item.
          example: 12.34
          format: double
          type: number
        printOnInvoice:
          description: Indicates whether the included item will be printed on the
            invoice.
          example: true
          type: boolean
        printOnOrderReceipt:
          description: Indicates whether the included item will be printed on the
            order receipt.
          example: true
          type: boolean
        quantity:
          description: The quantity of the included item.
          example: 2
          type: number
    Indicators:
      allOf:
      - $ref: '#/components/schemas/CurrencyHolder'
      - properties:
          customers:
            type: integer
          discountsAmount:
            allOf:
            - $ref: '#/components/schemas/Amount'
            description: The amount of invoice discounts
          meals:
            description: The amount of meals sold
            format: double
            type: number
          salesAmount:
            allOf:
            - $ref: '#/components/schemas/Amount'
            description: The sum of invoice subtotals. Note that you should add `itemsDiscount`
              from `/indicators/discount` to get the gross sales amount.
          taxesAmount:
            $ref: '#/components/schemas/Amount'
        type: object
      example:
        currency: $
        currencyDecimal: 2
        customers: 1
        discountsAmount: 2.35
        meals: 10
        salesAmount: 10.99
        taxesAmount: 1.65
    InventoryCategory:
      description: An object of inventory category.
      properties:
        id:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The id of the inventory category.
        licenceNumber:
          description: The licence number of the location owning the configuration
            of the inventory category.
          example: 12345
          type: number
        locationId:
          description: The id of the location the inventory category belongs to.
          example: 01234567-89ab-cdef-0123-456789abcdef
          format: uuid
          type: string
        name:
          description: The name of the inventory category.
          example: Inventory Category Name
          type: string
        remoteId:
          description: The remote id of the inventory category.
          example: 1
          type: integer
    InventoryLocalisation:
      description: An object of inventory localisation.
      properties:
        id:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The id of the inventory localisation.
        licenceNumber:
          description: The licence number of the location owning the configuration
            of the inventory localisation.
          example: 12345
          type: number
        locationId:
          description: The id of the location the inventory localisation belongs to.
          example: 01234567-89ab-cdef-0123-456789abcdef
          format: uuid
          type: string
        name:
          description: The name of the inventory localisation.
          example: Inventory Localisation Name
          type: string
        remoteId:
          description: The remote id of the inventory localisation.
          example: 1
          type: integer
    Invoice:
      allOf:
      - $ref: '#/components/schemas/EntityIdHolder'
      - properties:
          accountingTime:
            allOf:
            - $ref: '#/components/schemas/DateTime'
            description: The accounting date of the invoice (depending on the location
              day's closure).
          carrierEmployeeId:
            $ref: '#/components/schemas/UUID'
          cashDiscount:
            allOf:
            - $ref: '#/components/schemas/Amount'
            description: The discount amount when an invoice is paid entirely in cash.
          cashDiscountId:
            allOf:
            - $ref: '#/components/schemas/UUID'
            description: The id of the cash discount.
          clientId:
            description: The client id of the location.
            example: clientId123
            type: string
          closeTime:
            allOf:
            - $ref: '#/components/schemas/DateTime'
            description: The datetime when the invoice was closed (UTC). If invoice
              was sent before Veloce 9.50, this will be the Unix epoch ( 1970-01-01
              00:00:00)
          created:
            allOf:
            - $ref: '#/components/schemas/DateTime'
            description: The datetime when the invoice was inserted into the VelCloud
              database.
          customers:
            description: The number of customers involved in this invoice.
            type: number
          discount:
            allOf:
            - $ref: '#/components/schemas/Amount'
            description: The global discount amount.
          discountId:
            allOf:
            - $ref: '#/components/schemas/UUID'
            description: The id of the discount.
          invoiceLocalTime:
            allOf:
            - $ref: '#/components/schemas/DateTime'
            description: the invoice date configured in Veloce which is either the
              time the invoice was opened (openTime) or the time the invoice was closed
              (closeTime) in local time.
          invoiceNumber:
            description: The unique numeric identifier for the invoice.
            minimum: 0
            type: integer
          invoiceTime:
            allOf:
            - $ref: '#/components/schemas/DateTime'
            description: the invoice date configured in Veloce which is either the
              time the invoice was opened (openTime) or the time the invoice was closed
              (closeTime).
          isCancelled:
            description: Whether this invoice is cancelled or not
            type: boolean
          isTraining:
            description: |
              Whether this invoice was made during training or not.
              training invoices do not count towards normal sales.
            type: boolean
          lastUpdated:
            allOf:
            - $ref: '#/components/schemas/DateTime'
            description: The datetime for the last invoice update.
          licenceNumber:
            $ref: '#/components/schemas/LicenceNumber'
          locationId:
            $ref: '#/components/schemas/UUID'
          meals:
            description: count of meals on the invoice
            format: double
            type: number
          openTime:
            allOf:
            - $ref: '#/components/schemas/DateTime'
            description: The datetime when the invoice was opened (UTC).
          sellingEmployeeId:
            allOf:
            - $ref: '#/components/schemas/UUID'
            description: The id of the employee who created the order.
          status:
            allOf:
            - $ref: '#/components/schemas/InvoiceStatus'
          subTotal:
            allOf:
            - $ref: '#/components/schemas/Amount'
            description: The subtotal amount, excluding global discount, cash discount,
              and taxes.
          taxes:
            items:
              $ref: '#/components/schemas/InvoiceTax'
            type: array
          tip:
            allOf:
            - $ref: '#/components/schemas/Amount'
            description: The tip amount added to the invoice (gratuity amount).
          tipsTotalAmount:
            allOf:
            - $ref: '#/components/schemas/Amount'
            description: |
              The tip amount added to the invoice (gratuity amount) + the total left on a credit/debit card.
              This field defaults to 0 for invoices generated with Veloce versions lower than 9.53.1
          total:
            allOf:
            - $ref: '#/components/schemas/Amount'
            description: The total amount, including global discount, cash discount,
              and taxes.
          workstationId:
            allOf:
            - $ref: '#/components/schemas/UUID'
            description: The id of the POS used the order.
          zone:
            allOf:
            - $ref: '#/components/schemas/ZoneType'
        type: object
    InvoiceEmployee:
      properties:
        departmentId:
          description: the Veloce ID of the department
          type: integer
        id:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: the VelCloud ID of the employee
        name:
          description: the name of the employee
          type: string
        remoteId:
          description: the Veloce ID of the employee. This value is 1-indexed.
          type: integer
        sectionId:
          description: the Veloce ID of the section
          type: integer
    InvoiceStatus:
      description: |
        The type of invoice status.
         >
        | Type | Description |
        |------|-------------|
        |  0   | CLOSED      |
        |  1   | VOIDED      |
        |  2   | TRAINING    |
      enum:
      - 0
      - 1
      - 2
      type: number
    InvoiceTax:
      properties:
        amount:
          $ref: '#/components/schemas/Amount'
        id:
          description: the unique id of the tax type on VelServer
          type: number
        isVat:
          type: boolean
      type: object
    InvoiceWorkstation:
      description: the workstation on the invoice
      properties:
        alternativeName:
          type: string
        name:
          type: string
        remoteId:
          description: the Veloce External ID
          type: integer
    Item:
      properties:
        alternativeName:
          description: The alternative name of the item
          example: Mon item
          type: string
        barcode:
          description: The barcode of the item
          example: 1.23456789e+09
          type: string
        bigDivision:
          allOf:
          - $ref: '#/components/schemas/BigDivisionComplete'
          description: The big division linked to the item. Can be null if item doesn't
            belong to any big division
        calculateDeliveryCostEvenIfNotDelivery:
          description: Indicates whether or not the delivery cost will calculated
            on non deliveries orders.
          example: true
          type: boolean
        comboIncludedItem:
          allOf:
          - $ref: '#/components/schemas/ComboIncludedItem'
          description: The combo included item object. Only if specified in `include`.
            Not all endpoints may support this.
        comboIncludedItemId:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The id of the combo included item. Can be null if no combo
            included item is linked to the item.
        copyIfChange:
          description: If a changed regular price on the item has to be copied for
            all modes. Can be null if never configured
          example: true
          type: boolean
        cost:
          description: The cost of the item. Can be null if never configured
          example: 1.23
          type: number
        countdown:
          description: The countdown for the item.
          example: 30
          nullable: true
          type: number
        created:
          description: The creation date of the item.
          example: "2019-08-24T14:15:22Z"
          format: date-time
          type: string
        daysSincePurchased:
          description: The number of days since the last purchase
          example: 2
          type: integer
        deliveryCosts:
          description: The delivery costs linked to the item. Only provided if specified
            in `include`. Not all endpoints may support this.
          items:
            $ref: '#/components/schemas/ItemDeliveryCost'
          type: array
        division:
          allOf:
          - $ref: '#/components/schemas/DivisionWithLocation'
          description: The division linked to the item. Can be null if item doesn't
            belong to any division
        expiryDate:
          description: The expiry date of the item.
          example: "2019-08-24T00:00:00Z"
          format: date-time
          nullable: true
          type: string
        forcedModes:
          description: The fored modes linked to the item. Only provided if specified
            in `include`. Not all endpoints may support this.
          items:
            $ref: '#/components/schemas/ItemForcedMode'
          type: array
        hasTaxException:
          description: Indicates whether the item has a tax exception
          example: true
          type: boolean
        holdAndFireDelay:
          description: The hold and fire delay (in seconds) for the item
          example: 30
          type: number
        id:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The product id of the item
        includedItems:
          description: The included items linked with the item. Only provided if specified
            in `include`. Not all endpoints may support this.
          items:
            $ref: '#/components/schemas/IncludedItem'
          type: array
        inventoryCategory:
          allOf:
          - $ref: '#/components/schemas/InventoryCategory'
          description: The inventory category object. Only if specified in `include`.
            Not all endpoints may support this.
        inventoryCategoryId:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The id of the inventory category linked with the item.
          nullable: true
        inventoryCost:
          description: The inventory cost of the item.
          example: 12.34
          type: number
        isActive:
          description: The status of the item. False means it's archived
          example: true
          type: boolean
        isAvailable:
          description: Whether the item is available or not.
          example: true
          type: boolean
        isCountdownResetDaily:
          description: Indicates whether the countdown is reset daily
          example: true
          nullable: true
          type: boolean
        isDeliveryCostIncludedInPercentageCostCalculation:
          description: Indicates whether or not the delivery cost will be included
            in percentage cost calculation.
          example: true
          type: boolean
        isTaxVat:
          description: Indicates whether the tax is VAT. `null` if hasTaxException
            is false.
          example: true
          type: boolean
        isTaxablePerQuantity:
          description: Indicates whether the tax is taxable per quantity. `null` if
            hasTaxException is false.
          example: true
          type: boolean
        itemId:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The item id of the item
        itemLinkConfiguration:
          allOf:
          - $ref: '#/components/schemas/ItemLinkConfiguration'
          description: The item link configuration of the item. Only provided if specified
            in `include`. Not all endpoints may support this.
        itemLinkCounters:
          description: The counters linked to the item. Only provided if specified
            in `include`. Not all endpoints may support this.
          items:
            $ref: '#/components/schemas/ItemLinkCounter'
          type: array
        itemLinkMisc:
          allOf:
          - $ref: '#/components/schemas/ItemLinkMisc'
          description: The miscelaneous settings of the item. Only provided if specified
            in `include`. Not all endpoints may support this.
        itemTaxRules:
          description: The tax rules linked with the item. Only provided if specified
            in `include`. Not all endpoints may support this.
          items:
            $ref: '#/components/schemas/ItemTaxRule'
          type: array
        itemType:
          allOf:
          - $ref: '#/components/schemas/ItemType'
          description: The type of item
          example: 1
        itemVariations:
          description: The variations of the item. Only provided if specified in `include`.
            Not all endpoints may support this.
          items:
            $ref: '#/components/schemas/ItemVariation'
          type: array
        kind:
          allOf:
          - $ref: '#/components/schemas/ItemKind'
          description: The kind of the item
        lastPurchaseUnitCost:
          description: The last unit cost of the item.
          example: 12.34
          type: number
        lastUpdated:
          description: The last time the item has been updated.
          example: "2022-02-16T08:32:00Z"
          format: date-time
          type: string
        licenceNumber:
          $ref: '#/components/schemas/LicenceNumber'
        locationId:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The id of the location linked to the item
        logicalPrinter:
          allOf:
          - $ref: '#/components/schemas/LogicalPrinter'
          description: The logical printer object linked with the `logicalPrinterId`.
            Only provided if specified in `include`. Not all endpoints may support
            this.
        logicalPrinterId:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The logical printer ID linked with the item. Can be null if
            no logical printer is linked with the item.
        maximumQuantity:
          description: The maximum stock quantity.
          example: 10
          type: integer
        mealCount:
          description: The meal count of the item
          example: 10
          type: number
        minimumQuantity:
          description: The minimum stock quantity.
          example: 1
          type: integer
        mixMatch:
          allOf:
          - $ref: '#/components/schemas/MixMatch'
          description: The mix-match object linked with the `mixMatchId`. Only provided
            if specified in `include`. Not all endpoints may support this.
        mixMatchId:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The mix-match ID linked with the item. Can be null if no mix-match
            is linked with the item.
        name:
          description: The main name of the item
          example: My item
          type: string
        plu1:
          description: The first price look up of the products. Can be null
          example: ABC1234
          type: string
        plu2:
          description: The second price look up of the products. Can be null
          example: XYZ1234
          type: string
        popup:
          allOf:
          - $ref: '#/components/schemas/Popup'
          description: The popup object linked with the `popupId`. Only provided if
            specified in `include`. Not all endpoints may support this.
        popupId:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The popup ID linked with the item. Can be null if no popup
            is linked with the item.
        pourable:
          description: Indicates whether the item is pourable
          example: true
          type: boolean
        prices:
          description: The price configurations of the item. Only provided if specified
            in `include`. Not all endpoints may support this.
          items:
            $ref: '#/components/schemas/ItemPrice'
          type: array
        printDeliveryCostOnDriverSummary:
          description: Indicates whether or not the delivery cost will be printed
            on driver summary.
          example: true
          type: boolean
        regularPrice:
          description: The regular price of the item. Can be null if never configured
          example: 12.34
          type: number
        remoteId:
          description: The remote ID of the item. This value is 1-indexed.
          example: 1
          type: integer
        schedule:
          description: The schedule of the item. Only provided if specified in `include`.
            Not all endpoints may support this.
          items:
            $ref: '#/components/schemas/ItemSchedule'
          type: array
        screen:
          allOf:
          - $ref: '#/components/schemas/Screen'
          description: The screen linked to the item. Can be null if item doesn't
            belong to any screen
        stockQuantity:
          description: The stock quantity.
          example: 9
          minimum: 0
          type: integer
        supplier:
          allOf:
          - $ref: '#/components/schemas/Supplier'
          description: The supplier object. Only if specified in `include`. Not all
            endpoints may support this.
        supplierId:
          allOf:
          - $ref: '#/components/schemas/UUID'
          description: The id of the supplier linked with the item.
          nullable: true
        supplierProductCode:
          description: The product code of the item for the supplier.
          example: CODE
          type: string
        usedUnitCost:
          description: The unit cost of the item.
          example: 12.34
          type: number
        waiveDeliveryCost:
          description: Indicates whether or not cost are applied on waive deliveries.
          example: true
          type: boolean
    ItemCorrection:
      description: object containing item correction information
      properties:
        accountingTime:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: The fiscal date of when the item correction happened
        employee:
          allOf:
          - $ref: '#/components/schemas/Employee'
          description: The complete information of the employee of the item correction.
            The field is only present if included with `include`
        employeeId:
          description: The unique id of the employee of the item correction
          format: uuid
          type: string
        eventLocalTime:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: The local date of when the item correction happened
        eventTime:
          allOf:
          - $ref: '#/components/schemas/DateTime'
          description: The UTC date of when the item correction happened
        id:
          description: The unique id of the item correction
          format: uuid
          type: string
        licenceNumber:
          description: The licence number which the item correction belongs to
          type: number
        location:
          allOf:
          - $ref: '#/components/schemas/Location'
          description: The location linked to the item correction. It is only present
            if included with include
        locationId:
          description: The unique id of the location which to item correction belongs
            to
          format: uuid
          type: string
        price:
          $ref: '#/components/schemas/Amount'
        product:
          allOf:
          - $ref: '#/components/schemas/Product'
          description: The complete information of the product of the item correction.
