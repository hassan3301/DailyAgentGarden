          item:
            properties:
              alternativeName:
                description: The alternative name of the item.
                type: string
              id:
                allOf:
                - $ref: '#/components/schemas/UUID'
                description: The id of the item.
              kind:
                allOf:
                - $ref: '#/components/schemas/ItemKind'
                description: the kind of item
